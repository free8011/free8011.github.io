<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 축구 스쿼드</title>
    <!-- html2canvas 라이브러리: 캔버스 내용을 이미지로 저장하는 데 사용됩니다. -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- CSS 파일 연결 -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>나만의 축구 스쿼드</h1>
    <div class="content-container">
        <!-- 왼쪽 섹션: 스쿼드 편집 영역 -->
        <div class="squad-editor">
            <div class="controls">
                <label for="formationSelect">전술 선택:</label>
                <select id="formationSelect">
                    <option value="4-2-3-1">4-2-3-1</option>
                    <option value="4-1-2-3">4-1-2-3</option>
                    <option value="4-3-3">4-3-3</option>
                    <option value="4-4-2">4-4-2</option>
                    <option value="3-5-2">3-5-2</option>
                    <option value="5-3-2">5-3-2</option>
                </select>
                <select id="quarterSelect">
                    <option value="1 쿼터">1 쿼터</option>
                    <option value="2 쿼터">2 쿼터</option>
                    <option value="3 쿼터">3 쿼터</option>
                    <option value="4 쿼터">4 쿼터</option>
                </select>
                <button id="saveSquadButton">스쿼드 저장</button>
                <button id="downloadButton">PNG로 저장</button>
            </div>

            <br>
            <!-- 캔버스 및 선수 이름 입력 필드 컨테이너 -->
            <div id="canvasContainer">
                <canvas id="squadCanvas"></canvas>

                <!-- 심판 및 촬영 인원 통합 박스 -->
                <div id="fixedPersonnelBox" class="fixed-personnel-box">
                    <div class="fixed-personnel-item">
                        <label>심판</label>
                        <select id="refereeSelect" class="player-name-select"></select>
                    </div>
                    <div class="fixed-personnel-item">
                        <label>촬영</label>
                        <select id="filmingSelect" class="player-name-select"></select>
                    </div>
                </div>
            </div>
            <div class="saved-quarters">
                <p>저장된 쿼터:</p>
                <ul id="savedQuartersList">
                    <li>
                        <span class="quarter-label">1 쿼터:</span>
                        <span class="quarter-status" data-quarter="1">없음</span>
                        <div class="quarter-buttons" data-quarter="1" style="display: none;">
                            <button class="quarter-btn quarter-open-btn" data-quarter="1">열기</button>
                            <button class="quarter-btn quarter-download-btn" data-quarter="1">바로가기 다운로드</button>
                        </div>
                    </li>
                    <li>
                        <span class="quarter-label">2 쿼터:</span>
                        <span class="quarter-status" data-quarter="2">없음</span>
                        <div class="quarter-buttons" data-quarter="2" style="display: none;">
                            <button class="quarter-btn quarter-open-btn" data-quarter="2">열기</button>
                            <button class="quarter-btn quarter-download-btn" data-quarter="2">바로가기 다운로드</button>
                        </div>
                    </li>
                    <li>
                        <span class="quarter-label">3 쿼터:</span>
                        <span class="quarter-status" data-quarter="3">없음</span>
                        <div class="quarter-buttons" data-quarter="3" style="display: none;">
                            <button class="quarter-btn quarter-open-btn" data-quarter="3">열기</button>
                            <button class="quarter-btn quarter-download-btn" data-quarter="3">바로가기 다운로드</button>
                        </div>
                    </li>
                    <li>
                        <span class="quarter-label">4 쿼터:</span>
                        <span class="quarter-status" data-quarter="4">없음</span>
                        <div class="quarter-buttons" data-quarter="4" style="display: none;">
                            <button class="quarter-btn quarter-open-btn" data-quarter="4">열기</button>
                            <button class="quarter-btn quarter-download-btn" data-quarter="4">바로가기 다운로드</button>
                        </div>
                    </li>
                    </ul>
            </div>
        </div>

        <!-- 스쿼드 요약 섹션 -->
        <div id="squadSummary">
            <div class="controls">
                <!-- 새로운 선수 명단 추가 섹션 -->
                <div class="player-roster-management">
                    <label for="newPlayerNameInput">새 선수 명단 추가 (쉼표 또는 띄어쓰기로 구분):</label>
                    <input type="text" id="newPlayerNameInput" placeholder="예: 김철수, 이영희, 박지성">
                    <button id="addPlayerToRosterButton">명단에 추가</button>
                </div>
            </div>
            <h2>스쿼드 요약</h2>
            <table>
                <thead>
                    <tr>
                        <th data-sort-key="name">선수 이름</th>
                        <th data-sort-key="quarters">포함된 쿼터</th>
                        <th data-sort-key="quarterCount">포함된 쿼터 수</th>
                        <th>작업</th>
                    </tr>
                </thead>
                <tbody id="squadSummaryBody">
                <!-- 데이터는 JavaScript로 여기에 삽입됩니다 -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- JavaScript 파일 연결 -->
    <script src="script.js"></script>
</body>
</html>
