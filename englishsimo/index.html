<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="englishsimo">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%234A90D9'/><text y='.9em' font-size='70' x='50' text-anchor='middle' font-family='sans-serif' fill='white'>E</text></svg>">
<title>englishsimo</title>
<style>
:root {
  --font-size: 16px;
  --word-col-width: 10;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left: env(safe-area-inset-left, 0px);
  --safe-right: env(safe-area-inset-right, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, system-ui, sans-serif;
  background: #f5f5f7;
  color: #1c1c1e;
  height: 100dvh;
  overflow: hidden;
  -webkit-overflow-scrolling: touch;
  user-select: none;
  -webkit-user-select: none;
}

/* ===== SCREENS ===== */
.screen {
  position: fixed; inset: 0;
  display: none;
  flex-direction: column;
  padding-top: var(--safe-top);
  padding-left: var(--safe-left);
  padding-right: var(--safe-right);
  padding-bottom: var(--safe-bottom);
  background: #f5f5f7;
}
.screen.active { display: flex; }

/* ===== NAV BAR ===== */
.navbar {
  display: flex;
  align-items: center;
  height: 52px;
  padding: 0 16px;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(0,0,0,0.1);
  flex-shrink: 0;
  z-index: 10;
}
.navbar-title {
  flex: 1;
  font-size: 17px;
  font-weight: 600;
  text-align: center;
}
.navbar-btn {
  background: none;
  border: none;
  font-size: 17px;
  color: #007aff;
  cursor: pointer;
  padding: 8px;
  min-width: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  transition: background 0.15s;
}
.navbar-btn:active { background: rgba(0,122,255,0.1); }
.navbar-btn.active { color: #007aff; font-weight: 600; }
.navbar-btn.danger { color: #ff3b30; }

/* ===== BOOK LIST SCREEN ===== */
#screen-books .list-container {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.book-list { padding: 16px; display: flex; flex-direction: column; gap: 10px; }

.book-row-wrapper {
  position: relative;
  overflow: hidden;
  border-radius: 12px;
}

.book-row-actions {
  position: absolute;
  right: 0; top: 0; bottom: 0;
  display: flex;
  align-items: stretch;
  transform: translateX(100%);
  transition: transform 0.25s ease;
  z-index: 2;
}
.book-row-actions.revealed { transform: translateX(0); }

.action-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 18px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  color: white;
  min-width: 72px;
}
.action-btn.rename { background: #ff9500; }
.action-btn.delete { background: #ff3b30; border-radius: 0 12px 12px 0; }

.book-row {
  display: flex;
  align-items: center;
  background: white;
  padding: 14px 16px;
  border-radius: 12px;
  cursor: pointer;
  transition: background 0.15s, transform 0.25s ease;
  position: relative;
  z-index: 1;
  min-height: 64px;
}
.book-row:active { background: #f0f0f5; }
.book-row.swiped { transform: translateX(-144px); border-radius: 12px 0 0 12px; }

.book-icon {
  font-size: 28px;
  margin-right: 14px;
}
.book-info { flex: 1; min-width: 0; }
.book-name {
  font-size: 16px;
  font-weight: 600;
  color: #1c1c1e;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.book-meta {
  font-size: 13px;
  color: #8e8e93;
  margin-top: 2px;
}
.book-arrow {
  color: #c7c7cc;
  font-size: 18px;
  margin-left: 8px;
}

/* ===== STUDY SCREEN ===== */
#screen-study {
  background: #f5f5f7;
}

.study-toolbar {
  display: flex;
  align-items: center;
  height: 52px;
  padding: 0 8px;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(0,0,0,0.1);
  flex-shrink: 0;
  gap: 2px;
  z-index: 200;
}

.tb-group {
  display: flex;
  align-items: center;
  gap: 0px;
}
.tb-sep {
  width: 1px;
  height: 28px;
  background: rgba(0,0,0,0.12);
  margin: 0 4px;
}
.tb-spacer { flex: 1; }

.tb-btn {
  background: none;
  border: none;
  font-size: 15px;
  color: #007aff;
  cursor: pointer;
  padding: 6px 8px;
  border-radius: 8px;
  min-width: 36px;
  min-height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
  white-space: nowrap;
}
.tb-btn:active { background: rgba(0,122,255,0.1); }
.tb-btn.active { background: rgba(0,122,255,0.15); color: #007aff; font-weight: 700; }
.tb-btn.draw-active { color: #007aff; background: rgba(0,122,255,0.12); }
.font-size-display {
  font-size: 13px;
  color: #3c3c43;
  min-width: 28px;
  text-align: center;
}

/* ===== PAGE CONTAINER ===== */
.pages-container {
  flex: 1;
  min-height: 0;
  position: relative;
  overflow: hidden;
}

/* Vertical paging */
.pages-scroll.vertical {
  width: 100%;
  height: 100%;
  overflow-y: scroll;
  overflow-x: hidden;
  scroll-snap-type: y mandatory;
  -webkit-scroll-snap-type: y mandatory;
  display: flex;
  flex-direction: column;
  overscroll-behavior-y: contain;
}
.pages-scroll.vertical .page {
  width: 100%;
  height: 100%;
  flex-shrink: 0;
  scroll-snap-align: start;
  scroll-snap-stop: always;
}

/* Horizontal paging */
.pages-scroll.horizontal {
  width: 100%;
  height: 100%;
  overflow-x: scroll;
  overflow-y: hidden;
  scroll-snap-type: x mandatory;
  -webkit-scroll-snap-type: x mandatory;
  display: flex;
}
.pages-scroll.horizontal .page {
  flex-shrink: 0;
  width: 100%;
  height: 100%;
  scroll-snap-align: start;
  scroll-snap-stop: always;
}

.page {
  display: flex;
  flex-direction: column;
  padding: 8px 0 0 0;
  overflow: hidden;
}

.page-words {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ===== WORD ROW ===== */
.word-row {
  display: flex;
  align-items: flex-start;
  padding: 7px 12px;
  border-bottom: 1px solid rgba(0,0,0,0.06);
  gap: 10px;
  min-height: calc(var(--font-size) * 2.8);
  user-select: none;
  -webkit-user-select: none;
}
.word-row:last-child { border-bottom: none; }

.word-num {
  font-size: calc(var(--font-size) * 0.72);
  color: #aeaeb2;
  font-family: "SF Mono", "Courier New", monospace;
  min-width: 28px;
  text-align: right;
  padding-top: 2px;
  flex-shrink: 0;
}

.word-col {
  flex: 0 0 calc(var(--word-col-width) * 1em);
  min-width: 0;
  display: flex;
  flex-direction: column;
}
.word-text {
  font-size: var(--font-size);
  font-weight: 600;
  color: #1c1c1e;
  display: flex;
  align-items: center;
  gap: 6px;
  line-height: 1.3;
}
.speak-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 3px;
  color: #c7c7cc;
  flex-shrink: 0;
  transition: color 0.2s, transform 0.15s;
  line-height: 0;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.speak-btn:active { transform: scale(0.88); }
.speak-btn.speaking { color: #007aff; }
.speak-btn svg { width: calc(var(--font-size) * 0.9); height: calc(var(--font-size) * 0.9); }
.word-pronunciation {
  font-size: calc(var(--font-size) * 0.68);
  color: #aeaeb2;
  font-family: "SF Mono", "Courier New", monospace;
  margin-top: 1px;
  line-height: 1.2;
}

.meaning-col {
  flex: 1;
  min-width: 0;
  display: flex;
  align-items: flex-start;
  padding-top: 1px;
}

.meaning-wrap {
  display: flex;
  align-items: flex-start;
  gap: 5px;
  width: 100%;
}

.pos-badge {
  flex-shrink: 0;
  font-size: calc(var(--font-size) * 0.62);
  font-weight: 600;
  border-radius: 50%;
  width: calc(var(--font-size) * 1.3);
  height: calc(var(--font-size) * 1.3);
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1.5px solid;
  margin-top: 1px;
}
.pos-동 { color: #0a84ff; border-color: #0a84ff; }
.pos-명 { color: #30d158; border-color: #30d158; }
.pos-형 { color: #ff9f0a; border-color: #ff9f0a; }
.pos-부 { color: #bf5af2; border-color: #bf5af2; }
.pos-전 { color: #5ac8fa; border-color: #5ac8fa; }
.pos-접 { color: #ff6b6b; border-color: #ff6b6b; }

.meaning-text {
  font-size: var(--font-size);
  color: #1c1c1e;
  line-height: 1.3;
  flex: 1;
  transition: opacity 0.25s ease;
}
.meaning-text.hidden { display: none; }

.meaning-placeholder {
  height: calc(var(--font-size) * 1.3);
  background: #e5e5ea;
  border-radius: 5px;
  width: 80%;
  transition: opacity 0.25s ease;
}
.meaning-placeholder.hidden { display: none; }

/* ===== PAGE INDICATOR ===== */
.page-indicator {
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  color: #8e8e93;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-top: 1px solid rgba(0,0,0,0.08);
  flex-shrink: 0;
  z-index: 10;
}

/* ===== DRAWING CANVAS ===== */
#draw-canvas {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  width: 100%;
  height: 100%;
  z-index: 100;
  pointer-events: none;
  touch-action: none;
}
#draw-canvas.active { pointer-events: all; }

/* ===== SETTINGS PANEL ===== */
#screen-settings {
  background: #f5f5f7;
}
.settings-body {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.settings-section {
  background: white;
  border-radius: 12px;
  overflow: hidden;
}
.settings-row {
  padding: 14px 16px;
  border-bottom: 1px solid rgba(0,0,0,0.06);
  display: flex;
  align-items: center;
  gap: 12px;
}
.settings-row:last-child { border-bottom: none; }
.settings-label {
  font-size: 16px;
  color: #1c1c1e;
  flex: 1;
}
.settings-value {
  font-size: 14px;
  color: #8e8e93;
}

/* Toggle */
.toggle-wrap {
  display: flex;
  background: #e5e5ea;
  border-radius: 8px;
  overflow: hidden;
}
.toggle-opt {
  padding: 7px 14px;
  font-size: 14px;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
  color: #8e8e93;
  border: none;
  background: none;
}
.toggle-opt.active {
  background: #007aff;
  color: white;
  border-radius: 8px;
}

/* Slider */
.slider-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1;
}
.settings-slider {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 4px;
  border-radius: 2px;
  background: #e5e5ea;
  outline: none;
}
.settings-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: #007aff;
  cursor: pointer;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}

/* Preview row */
.preview-row {
  display: flex;
  align-items: flex-start;
  padding: 12px 16px;
  gap: 10px;
}
.preview-num {
  font-size: 11px;
  color: #aeaeb2;
  font-family: monospace;
  min-width: 24px;
  text-align: right;
}
.preview-word-col {
  display: flex;
  flex-direction: column;
}
.preview-word {
  font-weight: 600;
  color: #1c1c1e;
}
.preview-pron {
  color: #aeaeb2;
  font-family: monospace;
}
.preview-meaning-col {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 5px;
}

/* ===== PDF IMPORT SCREEN ===== */
#screen-pdf {
  background: #f5f5f7;
}
.pdf-body {
  flex: 1;
  overflow-y: auto;
  padding: 24px 20px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.pdf-upload-zone {
  border: 2px dashed #c7c7cc;
  border-radius: 16px;
  padding: 40px 20px;
  text-align: center;
  background: white;
  cursor: pointer;
}
.pdf-upload-icon { font-size: 48px; margin-bottom: 12px; }
.pdf-upload-title { font-size: 17px; font-weight: 600; color: #1c1c1e; margin-bottom: 6px; }
.pdf-upload-sub { font-size: 14px; color: #8e8e93; }
#pdf-file-input { display: none; }

.progress-section {
  background: white;
  border-radius: 12px;
  padding: 16px;
  display: none;
}
.progress-section.active { display: block; }
.progress-title { font-size: 14px; color: #8e8e93; margin-bottom: 8px; }
.progress-bar-wrap {
  height: 6px;
  background: #e5e5ea;
  border-radius: 3px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: #007aff;
  border-radius: 3px;
  width: 0%;
  transition: width 0.3s ease;
}
.progress-status { font-size: 13px; color: #8e8e93; margin-top: 8px; }

.ocr-result {
  background: white;
  border-radius: 12px;
  padding: 16px;
  display: none;
}
.ocr-result.active { display: block; }
.ocr-result-title { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
.name-input {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid #e5e5ea;
  border-radius: 10px;
  font-size: 16px;
  outline: none;
  margin-bottom: 12px;
  font-family: inherit;
}
.name-input:focus { border-color: #007aff; }
.add-book-btn {
  width: 100%;
  padding: 14px;
  background: #007aff;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
}
.add-book-btn:active { background: #0062cc; }
.add-book-btn:disabled { background: #c7c7cc; }

/* ===== MODAL OVERLAY ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 500;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.hidden { display: none; }

/* ===== UTIL ===== */
.hidden { display: none !important; }

</style>
</head>
<body>

<!-- ===== BOOK LIST SCREEN ===== -->
<div id="screen-books" class="screen active">
  <div class="navbar">
    <span style="min-width:44px"></span>
    <span class="navbar-title">englishsimo</span>
    <button class="navbar-btn" id="btn-import-pdf" title="PDF 가져오기">＋</button>
  </div>
  <div class="list-container">
    <div class="book-list" id="book-list"></div>
  </div>
</div>

<!-- ===== PDF IMPORT SCREEN ===== -->
<div id="screen-pdf" class="screen">
  <div class="navbar">
    <button class="navbar-btn" id="btn-pdf-back">← 뒤로</button>
    <span class="navbar-title">PDF 가져오기</span>
    <span style="min-width:60px"></span>
  </div>
  <div class="pdf-body">
    <div class="pdf-upload-zone" id="pdf-upload-zone">
      <div class="pdf-upload-icon">📄</div>
      <div class="pdf-upload-title">PDF 파일 선택</div>
      <div class="pdf-upload-sub">탭하여 PDF 단어장을 가져오세요</div>
      <input type="file" id="pdf-file-input" accept=".pdf,application/pdf">
    </div>
    <div class="progress-section" id="progress-section">
      <div class="progress-title" id="progress-title">OCR 처리 중...</div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progress-bar-fill"></div>
      </div>
      <div class="progress-status" id="progress-status"></div>
    </div>
    <div class="ocr-result" id="ocr-result">
      <div class="ocr-result-title" id="ocr-result-title"></div>
      <input class="name-input" id="book-name-input" type="text" placeholder="단어장 이름 입력" maxlength="40">
      <button class="add-book-btn" id="btn-add-book">단어장 추가</button>
    </div>
  </div>
</div>

<!-- ===== STUDY SCREEN ===== -->
<div id="screen-study" class="screen">
  <!-- Toolbar -->
  <div class="study-toolbar" id="study-toolbar">
    <button class="navbar-btn" id="btn-study-back" style="font-size:15px;color:#007aff">← 뒤로</button>
    <!-- Font size controls (left) -->
    <div class="tb-group" id="toolbar-font">
      <button class="tb-btn" id="btn-font-dec" title="글자 작게">A<sup style="font-size:9px">−</sup></button>
      <span class="font-size-display" id="font-size-display">16</span>
      <button class="tb-btn" id="btn-font-inc" title="글자 크게">A<sup style="font-size:9px">+</sup></button>
    </div>
    <div class="tb-spacer"></div>
    <!-- Right controls -->
    <div class="tb-group" id="toolbar-normal">
      <button class="tb-btn" id="btn-toggle-meaning" title="뜻 가리기/보기"><span id="meaning-toggle-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></span> <span id="meaning-toggle-label">가리기</span></button>
      <div class="tb-sep"></div>
      <button class="tb-btn" id="btn-draw" title="그리기">✏️</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" id="btn-settings" title="설정">⚙️</button>
    </div>
    <!-- Draw toolbar (shown when drawing) -->
    <div class="tb-group hidden" id="toolbar-draw">
      <button class="tb-btn draw-active" id="btn-draw-pen" title="펜">✏️</button>
      <button class="tb-btn" id="btn-draw-eraser" title="지우개">🧹</button>
      <button class="tb-btn" id="btn-draw-clear" title="모두 지우기">🗑️</button>
      <button class="tb-btn" id="btn-draw-done" title="완료">✅</button>
    </div>
  </div>

  <!-- Pages container -->
  <div class="pages-container" id="pages-container">
    <div class="pages-scroll vertical" id="pages-scroll"></div>
  </div>

  <!-- Page indicator -->
  <div class="page-indicator" id="page-indicator">페이지 1 / 1 · #1–#20</div>

  <!-- Drawing canvas -->
  <canvas id="draw-canvas"></canvas>
</div>

<!-- ===== SETTINGS SCREEN ===== -->
<div id="screen-settings" class="screen">
  <div class="navbar">
    <span style="min-width:60px"></span>
    <span class="navbar-title">설정</span>
    <button class="navbar-btn" id="btn-settings-done" style="font-weight:600">완료</button>
  </div>
  <div class="settings-body">
    <div class="settings-section">
      <div class="settings-row">
        <span class="settings-label">페이지 방향</span>
        <div class="toggle-wrap">
          <button class="toggle-opt active" id="toggle-vertical" onclick="setSetting('pagingDir','vertical')">세로</button>
          <button class="toggle-opt" id="toggle-horizontal" onclick="setSetting('pagingDir','horizontal')">가로</button>
        </div>
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-row">
        <span class="settings-label">글자 크기</span>
        <div class="slider-wrap">
          <span style="font-size:12px;color:#8e8e93">A</span>
          <input type="range" class="settings-slider" id="slider-font" min="11" max="30" value="16" oninput="onFontSlider(this.value)">
          <span style="font-size:18px;color:#8e8e93">A</span>
        </div>
        <span class="settings-value" id="font-size-val">16pt</span>
      </div>
      <div class="settings-row">

// ===== POS CONFIG =====
const POS_MAP = {
  '동':'pos-동','명':'pos-명','형':'pos-형','부':'pos-부','전':'pos-전','접':'pos-접'
};

function parsePOS(meaning) {
  if (!meaning) return { pos: null, text: meaning || '' };
  const m = meaning.match(/^([동명형부전접])\s+(.+)$/);
  if (m) return { pos: m[1], text: m[2] };
  return { pos: null, text: meaning };
}

// ===== STATE =====
let currentBook = null;
let currentWords = [];
let settings = { pagingDir: 'vertical', fontSize: 16, wordColWidth: 10 };
let showMeaning = true;
let drawMode = false;
let drawTool = 'pen'; // 'pen' or 'eraser'
let strokes = []; // [{points:[{x,y}], color, width}]
let currentStroke = null;
let speaking = null; // currently speaking word id
let currentPageIdx = 0;
let wordsPerPage = 20;
let ocrWords = [];
let swipedRow = null;

// ===== PERSISTENCE =====
function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem('es_settings') || '{}');
    if (s.pagingDir) settings.pagingDir = s.pagingDir;
    if (s.fontSize) settings.fontSize = s.fontSize;
    if (s.wordColWidth) settings.wordColWidth = s.wordColWidth;
  } catch(e) {}
}
function saveSettings() {
  localStorage.setItem('es_settings', JSON.stringify(settings));
}

function loadUserBooks() {
  try {
    return JSON.parse(localStorage.getItem('es_user_books') || '[]');
  } catch(e) { return []; }
}
function saveUserBooks(books) {
  localStorage.setItem('es_user_books', JSON.stringify(books));
}
function getBuiltinName() {
  return localStorage.getItem('es_builtin_name') || '영어 기본 단어장';
}
function setBuiltinName(name) {
  localStorage.setItem('es_builtin_name', name);
}

// ===== SCREEN MANAGEMENT =====
const screens = {};
['books','pdf','study','settings'].forEach(id => {
  screens[id] = document.getElementById('screen-' + id);
});
function showScreen(name) {
  Object.values(screens).forEach(s => s.classList.remove('active'));
  if (screens[name]) screens[name].classList.add('active');
}

// ===== CSS VARIABLE UPDATE =====
function applyCSSVars() {
  const root = document.documentElement;
  root.style.setProperty('--font-size', settings.fontSize + 'px');
  root.style.setProperty('--word-col-width', settings.wordColWidth);
}

function calcWordsPerPage() {
  return Math.max(10, Math.floor(660 / (settings.fontSize * 1.9)));
}

// ===== BOOK LIST =====
function renderBookList() {
  const list = document.getElementById('book-list');
  list.innerHTML = '';
  const userBooks = loadUserBooks();
  const builtinName = getBuiltinName();

  // Built-in book
  const builtinRow = createBookRow({
    id: '__builtin__',
    name: builtinName,
    words: VOCABULARY_WORDS,
    isBuiltin: true
  });
  list.appendChild(builtinRow);

  // User books
  userBooks.forEach((book, idx) => {
    const row = createBookRow({ ...book, isBuiltin: false, userIdx: idx });
    list.appendChild(row);
  });
}

function createBookRow(book) {
  const wrapper = document.createElement('div');
  wrapper.className = 'book-row-wrapper';

  // Actions
  const actions = document.createElement('div');
  actions.className = 'book-row-actions';

  const renameBtn = document.createElement('button');
  renameBtn.className = 'action-btn rename';
  renameBtn.textContent = '이름 변경';
  renameBtn.style.whiteSpace = 'normal';
  renameBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    const newName = prompt('새 이름 입력:', book.name);
    if (newName && newName.trim()) {
      if (book.isBuiltin) {
        setBuiltinName(newName.trim());
      } else {
        const userBooks = loadUserBooks();
        userBooks[book.userIdx].name = newName.trim();
        saveUserBooks(userBooks);
      }
      closeSwipe();
      renderBookList();
    }
  });
  actions.appendChild(renameBtn);

  if (!book.isBuiltin) {
    const deleteBtn = document.createElement('button');
    deleteBtn.className = 'action-btn delete';
    deleteBtn.textContent = '삭제';
    deleteBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (confirm('"' + book.name + '"\n단어장을 삭제하시겠습니까?')) {
        const userBooks = loadUserBooks();
        userBooks.splice(book.userIdx, 1);
        saveUserBooks(userBooks);
        closeSwipe();
        renderBookList();
      }
    });
    actions.appendChild(deleteBtn);
  }
  wrapper.appendChild(actions);

  // Row
  const row = document.createElement('div');
  row.className = 'book-row';

  row.innerHTML = `
    <span class="book-icon">${book.isBuiltin ? '📗' : '📘'}</span>
    <div class="book-info">
      <div class="book-name">${escHtml(book.name)}</div>
      <div class="book-meta">${book.words.length}개 단어</div>
    </div>
    <span class="book-arrow">›</span>
  `;

  // Tap to open
  row.addEventListener('click', () => {
    if (row.classList.contains('swiped')) {
      closeSwipe();
      return;
    }
    openBook(book);
  });

  // Long-press to rename
  let longPressTimer = null;
  row.addEventListener('touchstart', (e) => {
    longPressTimer = setTimeout(() => {
      longPressTimer = null;
      const newName = prompt('새 이름 입력:', book.name);
      if (newName && newName.trim()) {
        if (book.isBuiltin) {
          setBuiltinName(newName.trim());
        } else {
          const userBooks = loadUserBooks();
          userBooks[book.userIdx].name = newName.trim();
          saveUserBooks(userBooks);
        }
        renderBookList();
      }
    }, 600);
  }, { passive: true });
  row.addEventListener('touchend', () => { clearTimeout(longPressTimer); });
  row.addEventListener('touchmove', () => { clearTimeout(longPressTimer); });

  // Swipe left
  let startX = 0, startY = 0, isDragging = false;
  row.addEventListener('touchstart', (e) => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    isDragging = false;
  }, { passive: true });

  row.addEventListener('touchmove', (e) => {
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    if (!isDragging && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 8) {
      isDragging = true;
    }
    if (isDragging && dx < -20) {
      e.preventDefault();
    }
  }, { passive: false });

  row.addEventListener('touchend', (e) => {
    if (isDragging) {
      const dx = e.changedTouches[0].clientX - startX;
      if (dx < -60) {
        if (swipedRow && swipedRow !== row) closeSwipe();
        row.classList.add('swiped');
        actions.classList.add('revealed');
        swipedRow = row;
        swipedActions = actions;
      } else {
        closeSwipe();
      }
    }
    isDragging = false;
  });

  wrapper.appendChild(row);
  return wrapper;
}

let swipedActions = null;
function closeSwipe() {
  if (swipedRow) { swipedRow.classList.remove('swiped'); swipedRow = null; }
  if (swipedActions) { swipedActions.classList.remove('revealed'); swipedActions = null; }
}

// Close swipe when tapping elsewhere
document.getElementById('book-list').addEventListener('click', (e) => {
  if (swipedRow && !e.target.closest('.book-row-wrapper')) closeSwipe();
});

// ===== OPEN BOOK =====
function openBook(book) {
  currentBook = book;
  currentWords = book.words;
  currentPageIdx = 0;
  strokes = [];
  drawMode = false;
  exitDrawMode();
  showMeaning = true;
  updateMeaningToggleLabel();
  applyCSSVars();
  wordsPerPage = calcWordsPerPage();
  buildPages();
  showScreen('study');
  scrollToPage(0, false);
  updatePageIndicator();
}

// ===== BUILD PAGES =====
function buildPages() {
  wordsPerPage = calcWordsPerPage();
  const scroll = document.getElementById('pages-scroll');
  scroll.className = 'pages-scroll ' + settings.pagingDir;
  scroll.innerHTML = '';

  const total = currentWords.length;
  const pageCount = Math.ceil(total / wordsPerPage);

  for (let p = 0; p < pageCount; p++) {
    const page = document.createElement('div');
    page.className = 'page';
    page.dataset.pageIdx = p;

    const wordsDiv = document.createElement('div');
    wordsDiv.className = 'page-words';

    const start = p * wordsPerPage;
    const end = Math.min(start + wordsPerPage, total);
    for (let i = start; i < end; i++) {
      wordsDiv.appendChild(createWordRow(currentWords[i], i));
    }
    page.appendChild(wordsDiv);
    scroll.appendChild(page);
  }

  // Listen for scroll to update indicator
  scroll.addEventListener('scroll', onPagesScroll, { passive: true });
}

function createWordRow(word, globalIdx) {
  const row = document.createElement('div');
  row.className = 'word-row';
  row.dataset.wordId = word.id;

  const { pos, text: meaningText } = parsePOS(word.meaning);

  // Number
  const numEl = document.createElement('span');
  numEl.className = 'word-num';
  numEl.textContent = (globalIdx + 1);
  row.appendChild(numEl);

  // Word column
  const wordCol = document.createElement('div');
  wordCol.className = 'word-col';

  const wordText = document.createElement('div');
  wordText.className = 'word-text';
  const wordSpan = document.createElement('span');
  wordSpan.textContent = word.word;
  wordText.appendChild(wordSpan);

  const speakBtn = document.createElement('button');
  speakBtn.className = 'speak-btn';
  speakBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>`;
  speakBtn.dataset.wordId = word.id;
  speakBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    speakWord(word.word, word.id, speakBtn);
  });
  wordText.appendChild(speakBtn);
  wordCol.appendChild(wordText);

  if (word.pronunciation) {
    const pron = document.createElement('div');
    pron.className = 'word-pronunciation';
    pron.textContent = word.pronunciation;
    wordCol.appendChild(pron);
  }
  row.appendChild(wordCol);

  // Meaning column
  const meaningCol = document.createElement('div');
  meaningCol.className = 'meaning-col';
  const meaningWrap = document.createElement('div');
  meaningWrap.className = 'meaning-wrap';

  if (pos && POS_MAP[pos]) {
    const badge = document.createElement('span');
    badge.className = 'pos-badge ' + POS_MAP[pos];
    badge.textContent = pos;
    meaningWrap.appendChild(badge);
  }

  const meaningTextEl = document.createElement('span');
  meaningTextEl.className = 'meaning-text' + (showMeaning ? '' : ' hidden');
  meaningTextEl.textContent = meaningText;
  meaningWrap.appendChild(meaningTextEl);

  const placeholder = document.createElement('div');
  placeholder.className = 'meaning-placeholder' + (showMeaning ? ' hidden' : '');
  meaningWrap.appendChild(placeholder);

  meaningCol.appendChild(meaningWrap);
  row.appendChild(meaningCol);

  return row;
}

// ===== PAGING =====
function onPagesScroll() {
  const scroll = document.getElementById('pages-scroll');
  let newIdx;
  if (settings.pagingDir === 'vertical') {
    newIdx = Math.round(scroll.scrollTop / scroll.clientHeight);
  } else {
    newIdx = Math.round(scroll.scrollLeft / scroll.clientWidth);
  }
  if (newIdx !== currentPageIdx) {
    currentPageIdx = newIdx;
    updatePageIndicator();
  }
}

function scrollToPage(idx, animate) {
  const scroll = document.getElementById('pages-scroll');
  const behavior = animate ? 'smooth' : 'instant';
  if (settings.pagingDir === 'vertical') {
    scroll.scrollTo({ top: idx * scroll.clientHeight, behavior });
  } else {
    scroll.scrollTo({ left: idx * scroll.clientWidth, behavior });
  }
}

function updatePageIndicator() {
  const pageCount = Math.ceil(currentWords.length / wordsPerPage);
  const start = currentPageIdx * wordsPerPage + 1;
  const end = Math.min((currentPageIdx + 1) * wordsPerPage, currentWords.length);
  document.getElementById('page-indicator').textContent =
    `페이지 ${currentPageIdx + 1} / ${pageCount} · #${start}–#${end}`;
}

// ===== FONT SIZE =====
function changeFontSize(delta) {
  settings.fontSize = Math.max(11, Math.min(30, settings.fontSize + delta));
  applyCSSVars();
  document.getElementById('font-size-display').textContent = settings.fontSize;
  saveSettings();

}

// ===== TTS =====
// 현재 재생 중인 오디오
let currentAudio = null;

function speakWord(word, wordId, btnEl) {
  stopSpeaking();

  speaking = wordId;
  if (btnEl) btnEl.classList.add('speaking');

  const onDone = () => {
    speaking = null;
    currentAudio = null;
    if (btnEl) btnEl.classList.remove('speaking');
    document.querySelectorAll('.speak-btn.speaking').forEach(b => b.classList.remove('speaking'));
  };

  // iOS Safari는 Web Speech API 사용 (Apple TTS = 최고 품질)
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  if (isIOS) {
    speakWithWebSpeech(word, onDone);
    return;
  }

  // 그 외: Google TTS 시도 → 실패 시 Web Speech API
  let fallbackUsed = false;
  const googleUrl = `https://translate.googleapis.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(word)}&tl=en-US&client=gtx&speed=0.8`;
  const audio = new Audio(googleUrl);
  // crossOrigin 없이 로드 (CORS 오류 방지)
  currentAudio = audio;

  audio.onended = onDone;
  audio.onerror = () => {
    if (fallbackUsed) return;
    fallbackUsed = true;
    currentAudio = null;
    speakWithWebSpeech(word, onDone);
  };

  audio.play().catch(() => {
    if (fallbackUsed) return;
    fallbackUsed = true;
    currentAudio = null;
    speakWithWebSpeech(word, onDone);
  });
}

function stopSpeaking() {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio = null;
  }
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  speaking = null;
  document.querySelectorAll('.speak-btn.speaking').forEach(b => b.classList.remove('speaking'));
}

function speakWithWebSpeech(word, onDone) {
  const synth = window.speechSynthesis;
  if (!synth) { onDone(); return; }

  const doSpeak = () => {
    const utter = new SpeechSynthesisUtterance(word);
    utter.lang = 'en-US';
    utter.rate = 0.78;
    utter.pitch = 1.0;
    // 가장 좋은 영어 목소리 선택
    const voices = synth.getVoices();
    const best = voices.find(v => /en.US/i.test(v.lang) && /(samantha|ava|allison|enhanced|premium)/i.test(v.name))
                || voices.find(v => /en.US/i.test(v.lang))
                || voices.find(v => /^en/i.test(v.lang));
    if (best) utter.voice = best;
    utter.onend = onDone;
    utter.onerror = onDone;
    synth.speak(utter);
  };

  if (synth.getVoices().length === 0) {
    synth.onvoiceschanged = () => { synth.onvoiceschanged = null; doSpeak(); };
  } else {
    doSpeak();
  }
}

// ===== DRAWING =====
const canvas = document.getElementById('draw-canvas');
const ctx = canvas.getContext('2d');
let isDrawing = false;
let lastMidX = 0, lastMidY = 0;
let animFrame = null;

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  redrawStrokes();
}

function enterDrawMode() {
  drawMode = true;
  canvas.classList.add('active');
  document.getElementById('toolbar-normal').classList.add('hidden');
  document.getElementById('toolbar-font').classList.add('hidden');
  document.getElementById('toolbar-draw').classList.remove('hidden');
  drawTool = 'pen';
  updateDrawToolUI();
  // prevent scroll on pages-scroll when drawing
  document.getElementById('pages-scroll').style.overflow = 'hidden';
}

function exitDrawMode() {
  drawMode = false;
  canvas.classList.remove('active');
  document.getElementById('toolbar-normal').classList.remove('hidden');
  document.getElementById('toolbar-font').classList.remove('hidden');
  document.getElementById('toolbar-draw').classList.add('hidden');
  document.getElementById('pages-scroll').style.overflow = '';
}

function updateDrawToolUI() {
  document.getElementById('btn-draw-pen').classList.toggle('draw-active', drawTool === 'pen');
  document.getElementById('btn-draw-eraser').classList.toggle('draw-active', drawTool === 'eraser');
}

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: e.clientX - rect.left,
    y: e.clientY - rect.top
  };
}

// Pointer Events API: 마우스/터치/애플펜슬 모두 지원
canvas.addEventListener('pointerdown', (e) => {
  if (!drawMode) return;
  e.preventDefault();
  canvas.setPointerCapture(e.pointerId);
  const pos = getPos(e);
  if (drawTool === 'pen') {
    currentStroke = { points: [pos], color: '#0055cc', width: 2.5 };
    isDrawing = true;
  } else {
    eraseAt(pos);
    isDrawing = true;
  }
});

canvas.addEventListener('pointermove', (e) => {
  if (!drawMode || !isDrawing) return;
  e.preventDefault();
  const pos = getPos(e);
  if (drawTool === 'pen' && currentStroke) {
    currentStroke.points.push(pos);
    scheduleRedraw();
  } else if (drawTool === 'eraser') {
    eraseAt(pos);
    scheduleRedraw();
  }
});

canvas.addEventListener('pointerup', (e) => {
  if (!drawMode) return;
  if (drawTool === 'pen' && currentStroke) {
    if (currentStroke.points.length >= 1) strokes.push(currentStroke);
    currentStroke = null;
  }
  isDrawing = false;
  scheduleRedraw();
});

canvas.addEventListener('pointercancel', (e) => {
  if (drawTool === 'pen' && currentStroke) {
    if (currentStroke.points.length >= 1) strokes.push(currentStroke);
    currentStroke = null;
  }
  isDrawing = false;
  scheduleRedraw();
});

function eraseAt(pos) {
  const r = 24;
  strokes = strokes.filter(stroke =>
    !stroke.points.some(p => Math.hypot(p.x - pos.x, p.y - pos.y) < r)
  );
}

function scheduleRedraw() {
  if (animFrame) cancelAnimationFrame(animFrame);
  animFrame = requestAnimationFrame(redrawStrokes);
}

function redrawStrokes() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  // Draw committed strokes
  for (const stroke of strokes) {
    drawStroke(stroke);
  }
  // Draw current stroke
  if (currentStroke && currentStroke.points.length > 0) {
    drawStroke(currentStroke);
  }
}

function drawStroke(stroke) {
  if (stroke.points.length === 0) return;
  ctx.beginPath();
  ctx.strokeStyle = stroke.color;
  ctx.lineWidth = stroke.width;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  const pts = stroke.points;
  if (pts.length === 1) {
    ctx.arc(pts[0].x, pts[0].y, stroke.width / 2, 0, Math.PI * 2);
    ctx.fillStyle = stroke.color;
    ctx.fill();
    return;
  }
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length - 1; i++) {
    const mx = (pts[i].x + pts[i+1].x) / 2;
    const my = (pts[i].y + pts[i+1].y) / 2;
    ctx.quadraticCurveTo(pts[i].x, pts[i].y, mx, my);
  }
  ctx.lineTo(pts[pts.length-1].x, pts[pts.length-1].y);
  ctx.stroke();
}

// ===== PDF IMPORT =====
function openPdfScreen() {
  // Reset state
  document.getElementById('progress-section').classList.remove('active');
  document.getElementById('ocr-result').classList.remove('active');
  document.getElementById('pdf-file-input').value = '';
  ocrWords = [];
  showScreen('pdf');
}

async function handlePdfFile(file) {
  if (!file || file.type !== 'application/pdf') {
    alert('PDF 파일을 선택해주세요.');
    return;
  }

  const progressSection = document.getElementById('progress-section');
  const progressFill = document.getElementById('progress-bar-fill');
  const progressStatus = document.getElementById('progress-status');
  const progressTitle = document.getElementById('progress-title');
  const ocrResult = document.getElementById('ocr-result');

  progressSection.classList.add('active');
  ocrResult.classList.remove('active');
  progressTitle.textContent = 'PDF 로드 중...';
  progressFill.style.width = '0%';
  progressStatus.textContent = '';

  try {
    // Load PDF.js lazily
    if (!window.pdfjsLib) {
      progressStatus.textContent = 'PDF.js 로드 중...';
      await loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');
      window.pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }

    // Load Tesseract.js lazily
    if (!window.Tesseract) {
      progressStatus.textContent = 'Tesseract.js 로드 중...';
      await loadScript('https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js');
    }

    progressTitle.textContent = 'OCR 처리 중...';

    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    const numPages = pdf.numPages;

    const worker = await Tesseract.createWorker(['eng', 'kor'], 1, {
      logger: () => {}
    });

    const wordsMap = new Map();
    const startPage = Math.min(4, numPages + 1); // skip first 3 pages

    for (let pageNum = startPage; pageNum <= numPages; pageNum++) {
      progressFill.style.width = ((pageNum - startPage + 1) / (numPages - startPage + 1) * 100).toFixed(0) + '%';
      progressStatus.textContent = `페이지 ${pageNum} / ${numPages} 처리 중...`;

      const page = await pdf.getPage(pageNum);
      const viewport = page.getViewport({ scale: 3.0 });
      const cvs = document.createElement('canvas');
      cvs.width = viewport.width;
      cvs.height = viewport.height;
      const context = cvs.getContext('2d');
      await page.render({ canvasContext: context, viewport }).promise;

      const result = await worker.recognize(cvs);
      const lines = result.data.lines;

      for (const line of lines) {
        if (!line.words || line.words.length === 0) continue;
        const pageW = cvs.width;
        const pageH = cvs.height;

        // Find English words in left column (x < 0.20)
        let engWord = null;
        let engY = null;
        for (const w of line.words) {
          const xRatio = w.bbox.x0 / pageW;
          const text = w.text.trim();
          if (xRatio < 0.20 && /^[a-zA-Z-]+$/.test(text) && text.length >= 2) {
            engWord = text.toLowerCase();
            engY = (w.bbox.y0 + w.bbox.y1) / 2 / pageH;
            break;
          }
        }

        if (!engWord) continue;

        // Find meaning in middle column (x 0.20-0.55) at similar y
        let meaning = '';
        for (const w of line.words) {
          const xRatio = w.bbox.x0 / pageW;
          const yMid = (w.bbox.y0 + w.bbox.y1) / 2 / pageH;
          if (xRatio >= 0.20 && xRatio <= 0.55 && Math.abs(yMid - engY) < 0.03) {
            const txt = w.text.trim();
            if (/[가-힣]/.test(txt)) {
              meaning += (meaning ? ' ' : '') + txt;
            }
          }
        }

        if (engWord && meaning) {
          const key = engWord + '|' + meaning;
          if (!wordsMap.has(key)) {
            wordsMap.set(key, { word: engWord, meaning });
          }
        }
      }
    }

    await worker.terminate();

    ocrWords = Array.from(wordsMap.values()).map((w, i) => ({
      id: Date.now() + i,
      word: w.word,
      pronunciation: '',
      meaning: w.meaning,
      word_num: i + 1,
      section: '단어',
      chapter: 'custom'
    }));

    progressFill.style.width = '100%';
    progressStatus.textContent = '완료!';

    document.getElementById('ocr-result-title').textContent =
      `${ocrWords.length}개 단어를 인식했습니다.`;
    document.getElementById('book-name-input').value =
      file.name.replace(/\.pdf$/i, '');
    ocrResult.classList.add('active');

  } catch (err) {
    progressStatus.textContent = '오류: ' + err.message;
    console.error(err);
  }
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

function addOcrBook() {
  if (ocrWords.length === 0) { alert('인식된 단어가 없습니다.'); return; }
  const nameInput = document.getElementById('book-name-input');
  const name = nameInput.value.trim();
  if (!name) { alert('단어장 이름을 입력해주세요.'); nameInput.focus(); return; }

  const userBooks = loadUserBooks();
  userBooks.push({ id: Date.now(), name, words: ocrWords });
  saveUserBooks(userBooks);

  alert(`"${name}" 단어장이 추가되었습니다. (${ocrWords.length}개 단어)`);
  showScreen('books');
  renderBookList();
}

}
